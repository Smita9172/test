<!DOCTYPE html>
<html lang="en">
<head>
  <title> Order, unordered list and table </title>
</head>
<body>
  <h2>Order list</h2>
  <ol>
    <li>C++</li>
    <li>Java</li>
    <li> C</li>
  </ol>
  <h2> Unorder List </h2>
  <ul>
    <li> Reading </li>
    <li>Sketching and drawing </li>
    <li> Singing </li>
  </ul>
  <h2> Table</h2>
  <table>

    </tr>

</body>
</html>
